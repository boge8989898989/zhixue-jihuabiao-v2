<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7e7b8"/>
      <stop offset="50%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#b8923f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#1a1a2e"/>
  
  <!-- Clipboard body -->
  <rect x="25" y="20" width="50" height="65" rx="5" fill="#2e2e3d" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- Clipboard clip -->
  <rect x="38" y="15" width="24" height="12" rx="3" fill="url(#goldGrad)" filter="url(#glow)"/>
  
  <!-- Lines -->
  <g stroke="#d4a853" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <line x1="32" y1="38" x2="68" y2="38"/>
    <line x1="32" y1="48" x2="60" y2="48"/>
    <line x1="32" y1="58" x2="64" y2="58"/>
    <line x1="32" y1="68" x2="55" y2="68"/>
    <line x1="32" y1="78" x2="62" y2="78"/>
  </g>
</svg>